<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .offline-container {
        text-align: center;
        max-width: 400px;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #667eea;
      }
      p {
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 1rem;
      }
      .status {
        display: inline-block;
        padding: 0.5rem 1rem;
        background: #764ba2;
        border-radius: 8px;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <h1>Bingo</h1>
      <p>You appear to be offline.</p>
      <p>Please check your internet connection and try again.</p>
      <div class="status">Offline Mode</div>
    </div>
  </body>
</html>
